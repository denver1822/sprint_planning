services:
  postgres:
    image: postgres:16-alpine
    container_name: planning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - planning_postgres_data:/var/lib/postgresql/data
    networks:
      - planning-network
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: planning-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:18000:8000"
    networks:
      - planning-network
    mem_limit: 256m
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  frontend:
    build: ./frontend
    container_name: planning-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:80"
    networks:
      - planning-network
    mem_limit: 64m

volumes:
  planning_postgres_data:

networks:
  planning-network:
    name: planning-network

