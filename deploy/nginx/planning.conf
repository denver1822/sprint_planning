server {
    listen 80;
    server_name planning.giants2108.myftp.biz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name planning.giants2108.myftp.biz;

    ssl_certificate /etc/letsencrypt/live/planning.giants2108.myftp.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planning.giants2108.myftp.biz/privkey.pem;
    client_max_body_size 2m;

    location /api/ {
        proxy_pass http://127.0.0.1:18000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:18000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

